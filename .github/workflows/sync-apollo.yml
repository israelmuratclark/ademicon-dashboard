name: Sync AVAPRO CRM Data

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch AVAPRO data
        env:
          AVAPRO_USERNAME: ${{ secrets.AVAPRO_USERNAME }}
          AVAPRO_PASSWORD: ${{ secrets.AVAPRO_PASSWORD }}
        run: python scripts/fetch_avapro.py

      - name: Commit updated data
        run: |
          git config user.email "avapro-sync@ademicon.com"
          git config user.name "AVAPRO Sync Bot"
          git add data.json
          git diff --staged --quiet || (git commit -m "chore: sync AVAPRO CRM data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
